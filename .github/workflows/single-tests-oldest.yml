name: Run pytest tests

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'Supported python versions'
        default: '["3.10", "3.11", "3.12", "3.13", "3.14", "pypy-3.11"]'
        required: false
        type: string
      os:
        description: 'Operating system to run tests on'
        default: 'ubuntu-latest'
        required: false
        type: string
    secrets:
      codecov_token:
        description: 'Codecov token'
        required: false

jobs:
  dynamodb:
    runs-on: ${{ inputs.os }}
    strategy:
      fail-fast: true
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    env:
      OS: ${{ inputs.os }}
      PYTHON: ${{ matrix.python-version }}
    # Service containers to run with `container-job`
    services:
      dynamodb:
        image: amazon/dynamodb-local:3.0.0
        ports:
          - 8088:8000

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install DynamoDB
      run: |
        mkdir /tmp/dynamodb
        wget -O - https://d1ni2b6xgvw0s0.cloudfront.net/v2.x/dynamodb_local_latest.tar.gz | tar xz --directory /tmp/dynamodb
    - name: Set up Pipenv on python ${{ matrix.python-version }}
      uses: fizyk/actions-reuse/.github/actions/pipenv-setup@v4.4.3
      with:
        python-version: ${{ matrix.python-version }}
        cache: false
        allow-prereleases: true
    - name: Install oldest supported versions
      uses: fizyk/actions-reuse/.github/actions/pipenv-run@v4.4.3
      with:
        command: pip install -r oldest/requirements.txt
    - uses: fizyk/actions-reuse/.github/actions/pipenv-run@v4.4.3
      with:
        command: pytest -c pyproject.oldest.toml -p no:xdist -k "not docker" --cov-report=xml
    - uses: fizyk/actions-reuse/.github/actions/pipenv-run@v4.4.3
      with:
        command: pytest -c pyproject.oldest.toml -n auto --max-worker-restart=0 -k "not docker" --cov-report=xml:coverage-xdist.xml
    - uses: fizyk/actions-reuse/.github/actions/pipenv@v4.4.3
      with:
        python-version: ${{ matrix.python-version }}
        command: pytest -c pyproject.oldest.toml -p no:xdist --cov-report=xml -k docker --dynamodb-host=localhost --dynamodb-port=8088 --cov-report=xml:coverage-docker.xml
        allow-prereleases: true
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5.5.2
      with:
        flags: linux
        env_vars: OS,PYTHON
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
