name: Run pytest tests

on:
  workflow_call:
    inputs:
      python-versions:
        description: 'Supported python versions'
        default: '["3.10", "3.11", "3.12", "3.13", "3.14", "pypy-3.11"]'
        required: false
        type: string
      os:
        description: 'Operating system to run tests on'
        default: 'ubuntu-latest'
        required: false
        type: string
    secrets:
      codecov_token:
        description: 'Codecov token'
        required: false

jobs:
  dynamodb:
    runs-on: ${{ inputs.os }}
    strategy:
      fail-fast: true
      matrix:
        python-version: ${{ fromJSON(inputs.python-versions) }}
    env:
      OS: ${{ inputs.os }}
      PYTHON: ${{ matrix.python-version }}
    # Service containers to run with `container-job`
    services:
      dynamodb:
        image: amazon/dynamodb-local:3.0.0
        ports:
          - 8088:8000

    steps:
    - uses: actions/checkout@v6
    - name: Install DynamoDB
      run: |
        mkdir /tmp/dynamodb
        wget -O - https://d1ni2b6xgvw0s0.cloudfront.net/v2.x/dynamodb_local_latest.tar.gz | tar xz --directory /tmp/dynamodb
    - name: Run serial tests (non-docker)
      id: run_serial_tests
      uses: fizyk/actions-reuse/.github/actions/pipenv@v4.4.3
      with:
        python-version: ${{ matrix.python-version }}
        command: python -m coverage run -m pytest -p no:xdist -k "not docker"
        env: '{"COVERAGE_PROCESS_START": ".coveragerc", "COVERAGE_FILE": ".coverage.serial"}'
        allow-prereleases: true
    - name: Combine and export serial coverage
      if: ${{ always() && (steps.run_serial_tests.conclusion == 'success' || steps.run_serial_tests.conclusion == 'failure') }}
      uses: fizyk/actions-reuse/.github/actions/coverage-combine-export@v4.4.3
      with:
        data-file: .coverage.serial
        output-file: coverage-serial.xml
    - name: Run xdist tests (non-docker)
      id: run_xdist_tests
      uses: fizyk/actions-reuse/.github/actions/pipenv-run@v4.4.3
      with:
        command: python -m coverage run -m pytest -n auto --max-worker-restart=0 -k "not docker"
        env: '{"COVERAGE_PROCESS_START": ".coveragerc", "COVERAGE_FILE": ".coverage.xdist"}'
    - name: Combine and export xdist coverage
      if: ${{ always() && (steps.run_xdist_tests.conclusion == 'success' || steps.run_xdist_tests.conclusion == 'failure') }}
      uses: fizyk/actions-reuse/.github/actions/coverage-combine-export@v4.4.3
      with:
        data-file: .coverage.xdist
        output-file: coverage-xdist.xml
    - name: Run serial docker tests
      id: run_docker_tests
      uses: fizyk/actions-reuse/.github/actions/pipenv-run@v4.4.3
      with:
        command: python -m coverage run -m pytest -p no:xdist -k docker --dynamodb-host=localhost --dynamodb-port=8088
        env: '{"COVERAGE_PROCESS_START": ".coveragerc", "COVERAGE_FILE": ".coverage.docker"}'
    - name: Combine and export docker coverage
      if: ${{ always() && (steps.run_docker_tests.conclusion == 'success' || steps.run_docker_tests.conclusion == 'failure') }}
      uses: fizyk/actions-reuse/.github/actions/coverage-combine-export@v4.4.3
      with:
        data-file: .coverage.docker
        output-file: coverage-docker.xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5.5.2
      with:
        files: coverage-serial.xml,coverage-xdist.xml,coverage-docker.xml
        flags: linux
        env_vars: OS,PYTHON
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
